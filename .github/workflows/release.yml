name: Release

on:
  push:
    tags:
      - "*" # Triggers only when you push a version tag like v1.0.0

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: timecalc-linux-x64
            asset_extension: .tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: timecalc-windows-x64
            asset_extension: .zip
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact_name: timecalc-macos-intel
            asset_extension: .zip
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_name: timecalc-macos-arm
            asset_extension: .zip

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build Binaries
        run: cargo build --release --all-features --target ${{ matrix.target }}

      - name: Package Assets
        shell: bash
        run: |
          # Create a staging directory
          STAGING="timecalc-${{ github.ref_name }}"
          mkdir -p "$STAGING"

          # Move binaries to staging (adjust names to match your [[bin]] section)
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            cp target/${{ matrix.target }}/release/timecalc-gui.exe "$STAGING/"
            cp target/${{ matrix.target }}/release/timecalc-cli.exe "$STAGING/"
          else
            cp target/${{ matrix.target }}/release/timecalc-gui "$STAGING/"
            cp target/${{ matrix.target }}/release/timecalc-cli "$STAGING/"
          fi

          # Include README
          cp README.md "$STAGING/"

          # Include changelog
          cp changelog.txt "$STAGING/"

          # Create Archive

          if [ "${{ matrix.os }}" = "ubuntu-latest" ]; then
            tar -czf ${{ matrix.artifact_name }}-${{ github.ref_name }}${{ matrix.asset_extension }} "$STAGING"
          else
            cd "$STAGING"
            7z a ../${{ matrix.artifact_name }}-${{ github.ref_name}}${{ matrix.asset_extension }} *
          fi

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.artifact_name }}-${{ github.ref_name }}${{ matrix.asset_extension }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
